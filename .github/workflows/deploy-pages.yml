name: Deploy to GitHub Pages

on:
  # Run on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blueprint-management
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: blueprint-management/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://blueprint-management.com
          NEXT_PUBLIC_SITE_NAME: Blueprint Management
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static export artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: blueprint-management/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
