name: secret-scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Runs our own scanner against everything changed since main.
      - name: Run repo secret scanner
        run: |
          # Emulate staged-files mode against the diff.
          git diff --name-only origin/main...HEAD > /tmp/files.txt || true
          node scripts/scan-secrets.mjs || exit 1

      # Belt & braces — gitleaks catches anything our regex misses.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: false
